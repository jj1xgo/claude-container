services:
  # Service with auth and workspace mounts
  claude-auth-workspace:
    build:
      context: ${BUILD_CONTEXT_DIR}
      dockerfile: ${CLAUDE_CONTAINER_DIR}/Dockerfile.claude
      args:
        TZ: ${TZ:-UTC}
        CACHEBUST: ${CACHEBUST:-unknown}
        CLAUDE_CODE_VERSION: ${CLAUDE_CODE_VERSION:-latest}
    stdin_open: true
    tty: true
    userns_mode: keep-id
    # init-firewall.sh がコンテナ内 netns に iptables ルールを引くのに必要
    cap_add:
      - NET_ADMIN
      - NET_RAW
    # IPv6 をカーネルレベルで無効化。podman のデフォルトブリッジは IPv6 グローバル
    # ルートを持たないが、glibc getaddrinfo(AI_ADDRCONFIG) はリンクローカルアドレス
    # (fe80::) の存在だけで「IPv6利用可能」と誤認し AAAA を優先するため、Happy
    # Eyeballs が到達不能な IPv6 候補への接続を試みて間欠的に失敗する（2026-07 に
    # 実障害として確認）。許可リストは A レコードのみ対象で IPv6 は元々不要なため、
    # そもそも候補に挙げさせない。init-firewall.sh の ip6tables DROP は後段の保険。
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
      - net.ipv6.conf.default.disable_ipv6=1
    #profiles:
    # Check this
    #- auth-workspace
    environment:
      TZ: ${TZ:-UTC}
      DISABLE_AUTOUPDATER: "1"
      CLAUDE_CONTAINER_NO_FIREWALL: ${CLAUDE_CONTAINER_NO_FIREWALL:-}
    volumes:
      - ${CLAUDE_CONFIG_DIR:-~}/.claude.json:/home/node/.claude.json
      - ${CLAUDE_CONFIG_DIR:-~}/.claude:/home/node/.claude
      - ${CONTEXT}:/workspace
      - ${EXTRA_MOUNT:-/dev/null}:/data
      # GitHub Issues 書き込み用トークン（gh CLI が GH_TOKEN 環境変数を自動認識）。
      # 未設定時は /dev/null をマウント（EXTRA_MOUNT と同じオプトインパターン）。
      # entrypoint.sh がこのファイルを読んで export する。environment: に直接書かない
      # 理由は entrypoint.sh 側のコメント参照（podman inspect にトークンを出さないため）。
      - ${GH_TOKEN_FILE:-/dev/null}:/home/node/.config/claude-container/gh-token:ro
      # ホスト側 git 設定のオプトインマウント（issue #6: Author identity unknown 対策）。
      # 未設定時は /dev/null をマウント（GH_TOKEN_FILE と同じオプトインパターン）。
      # :ro 必須 — コンテナ内から credential.helper 等を書き換えられるとホスト側
      # 任意コマンド実行につながるため。entrypoint.sh 側の処理は不要（git が直接読む）。
      - ${GITCONFIG_FILE:-/dev/null}:/home/node/.gitconfig:ro
      - /etc/localtime:/etc/localtime:ro
    working_dir: /workspace
