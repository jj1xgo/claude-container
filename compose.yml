services:
  # Service with auth and workspace mounts
  claude-auth-workspace:
    build:
      context: ${BUILD_CONTEXT_DIR}
      dockerfile: ${CLAUDE_CONTAINER_DIR}/Dockerfile.claude
      args:
        TZ: ${TZ:-UTC}
        CACHEBUST: ${CACHEBUST:-unknown}
        CLAUDE_CODE_VERSION: ${CLAUDE_CODE_VERSION:-latest}
    stdin_open: true
    tty: true
    userns_mode: keep-id
    # init-firewall.sh がコンテナ内 netns に iptables ルールを引くのに必要
    cap_add:
      - NET_ADMIN
      - NET_RAW
    # IPv6 をカーネルレベルで無効化。podman のデフォルトブリッジは IPv6 グローバル
    # ルートを持たないが、glibc getaddrinfo(AI_ADDRCONFIG) はリンクローカルアドレス
    # (fe80::) の存在だけで「IPv6利用可能」と誤認し AAAA を優先するため、Happy
    # Eyeballs が到達不能な IPv6 候補への接続を試みて間欠的に失敗する（2026-07 に
    # 実障害として確認）。許可リストは A レコードのみ対象で IPv6 は元々不要なため、
    # そもそも候補に挙げさせない。init-firewall.sh の ip6tables DROP は後段の保険。
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
      - net.ipv6.conf.default.disable_ipv6=1
    #profiles:
    # Check this
    #- auth-workspace
    environment:
      TZ: ${TZ:-UTC}
      DISABLE_AUTOUPDATER: "1"
      CLAUDE_CONTAINER_NO_FIREWALL: ${CLAUDE_CONTAINER_NO_FIREWALL:-}
    volumes:
      - ${CLAUDE_CONFIG_DIR:-~}/.claude.json:/home/node/.claude.json
      - ${CLAUDE_CONFIG_DIR:-~}/.claude:/home/node/.claude
      - ${CONTEXT}:/workspace
      - ${EXTRA_MOUNT:-/dev/null}:/data
      # 汎用シークレットディレクトリ（任意本数・任意名のトークンをコンテナへ持ち込むための
      # opt-in マウント。SECRETS_DIR 直下は export されない、export/ サブディレクトリの
      # ファイルのみコンテナ内で環境変数として export される — entrypoint.sh 参照）。
      # 未設定時は /dev/null をマウント（EXTRA_MOUNT と同じオプトインパターン。ディレクトリで
      # なく /dev/null になるため entrypoint.sh 側は [ -d ] で判別する）。
      - ${SECRETS_DIR:-/dev/null}:/home/node/.config/claude-container/secrets:ro
      # ホスト側 git 設定のオプトインマウント（issue #6: Author identity unknown 対策）。
      # 未設定時は /dev/null をマウント（GH_TOKEN_FILE と同じオプトインパターン）。
      # :ro 必須 — コンテナ内から credential.helper 等を書き換えられるとホスト側
      # 任意コマンド実行につながるため。entrypoint.sh 側の処理は不要（git が直接読む）。
      - ${GITCONFIG_FILE:-/dev/null}:/home/node/.gitconfig:ro
      # Codex CLI の認証情報ディレクトリのオプトインマウント（claude-container-ops#27）。
      # auth.json はセッション中にアクセストークンが自動リフレッシュされホストへ書き戻される
      # ため rw（:ro なし、GITCONFIG_FILE とは逆）。ホストの実 ~/.codex を直接指すと、
      # コンテナ側コードが config.toml（notify フック等）を汚染しホストで codex 起動時に
      # 任意コマンド実行につながるため、CODEX_DIR には専用ディレクトリ（例: ~/.codex-container）
      # を設定する前提（README「利用側プロジェクトの設定」節参照）。未設定時は /dev/null
      # （SECRETS_DIR と同じオプトインパターン）。entrypoint.sh 側の特別処理は不要
      # （codex CLI が直接読む、gitconfig と同型）。
      - ${CODEX_DIR:-/dev/null}:/home/node/.codex
      # MCP監査ゲートのTOFU承認記録（claude-container#28）。ホスト側 claude-container
      # スクリプトが人間の対話承認後にのみ書き込む1行ハッシュファイル。:ro必須 —
      # コンテナ内から書き換えられると次回起動の自動承認を偽装できてしまうため。
      # 未設定時は /dev/null（SECRETS_DIR と同じオプトインパターン）。
      - ${MCP_APPROVAL_FILE:-/dev/null}:/etc/claude-container/mcp-approved-hash:ro
      - /etc/localtime:/etc/localtime:ro
    working_dir: /workspace
